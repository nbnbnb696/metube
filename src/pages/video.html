<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - MeTube</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-play-circle"></i>
                <span>MeTube</span>
            </div>
        </div>
        <div class="nav-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search videos...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="nav-right">
            <button class="upload-btn" onclick="window.location.href='upload.html'">
                <i class="fas fa-video"></i> Upload
            </button>
            <button class="icon-btn"><i class="fas fa-bell"></i></button>
            <button class="icon-btn"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <div class="video-container">
        <div class="video-main">
            <div class="video-player">
                <video id="videoPlayer" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div class="video-info">
                <h1 class="video-title" id="videoTitle">Video Title</h1>
                <div class="video-stats">
                    <span id="videoViews">0 views • <span id="uploadDate">Jan 1, 2024</span></span>
                    <div class="video-actions">
                        <button class="action-btn" id="likeBtn">
                            <i class="fas fa-thumbs-up"></i>
                            <span id="likeCount">0</span>
                        </button>
                        <button class="action-btn" id="dislikeBtn">
                            <i class="fas fa-thumbs-down"></i>
                        </button>
                        <button class="action-btn" id="shareBtn">
                            <i class="fas fa-share"></i> Share
                        </button>
                        <button class="action-btn" id="downloadBtn">
                            <i class="fas fa-download"></i> Download
                        </button>
                        <button class="action-btn" id="clipBtn">
                            <i class="fas fa-cut"></i> Clip
                        </button>
                        <button class="action-btn" id="saveBtn">
                            <i class="fas fa-bookmark"></i> Save
                        </button>
                        <button class="action-btn" id="theaterBtn">
                            <i class="fas fa-expand"></i> Theater
                        </button>
                        <button class="action-btn" id="miniPlayerBtn">
                            <i class="fas fa-compress"></i> Miniplayer
                        </button>
                        <button class="action-btn" id="speedBtn">
                            <i class="fas fa-tachometer-alt"></i> Speed
                        </button>
                    </div>
                </div>
            </div>

            <div class="channel-info">
                <div class="channel-left">
                    <div class="channel-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="channel-details">
                        <h3 id="channelName">Channel Name</h3>
                        <p id="subscriberCount">0 subscribers</p>
                    </div>
                </div>
                <button class="subscribe-btn" id="subscribeBtn">Subscribe</button>
            </div>

            <div class="video-description" id="descriptionBox">
                <div class="desc-header">
                    <span id="videoViews2">0 views</span> • <span id="uploadDate2">Jan 1, 2024</span>
                    <span class="tags" id="videoTags"></span>
                </div>
                <p id="videoDescription" class="desc-text collapsed">Video description goes here...</p>
                <button class="show-more-btn" id="showMoreBtn">Show more</button>
            </div>

            <div class="comments-section">
                <div class="comments-header">
                    <h3><span id="commentCount">0</span> Comments</h3>
                    <button class="sort-btn" id="sortBtn"><i class="fas fa-sort"></i> Sort by</button>
                </div>
                <div class="add-comment">
                    <div class="comment-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="comment-input-wrapper">
                        <input type="text" id="commentInput" placeholder="Add a comment...">
                        <div class="comment-actions" id="commentActions" style="display:none;">
                            <button class="cancel-comment-btn" id="cancelCommentBtn">Cancel</button>
                            <button class="comment-btn" id="addCommentBtn">Comment</button>
                        </div>
                    </div>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>

        <div class="video-sidebar">
            <h3>Recommended Videos</h3>
            <div class="recommended-videos" id="recommendedVideos"></div>
        </div>
    </div>

    <script src="video.js"></script>
</body>
</html>
