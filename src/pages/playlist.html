<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists - MeTube</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <button class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-play-circle"></i>
                <span>MeTube</span>
            </div>
        </div>
        <div class="nav-center">
            <div class="search-box">
                <input type="text" placeholder="Search videos...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="nav-right">
            <button class="icon-btn"><i class="fas fa-bell"></i></button>
            <button class="icon-btn"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <div class="playlist-container">
        <div class="playlist-header">
            <h1>Your Playlists</h1>
            <button class="create-playlist-btn" id="createPlaylistBtn"><i class="fas fa-plus"></i> New Playlist</button>
        </div>
        <div class="playlists-grid" id="playlistsGrid"></div>
    </div>

    <div class="modal" id="playlistModal" style="display:none;">
        <div class="modal-content">
            <h2>Create Playlist</h2>
            <input type="text" id="playlistName" placeholder="Playlist name">
            <textarea id="playlistDesc" placeholder="Description (optional)"></textarea>
            <select id="playlistPrivacy">
                <option value="public">Public</option>
                <option value="unlisted">Unlisted</option>
                <option value="private">Private</option>
            </select>
            <div class="modal-actions">
                <button class="cancel-btn" id="cancelPlaylistBtn">Cancel</button>
                <button class="publish-btn" id="savePlaylistBtn">Create</button>
            </div>
        </div>
    </div>

    <script src="playlist.js"></script>
</body>
</html>
